logoutput: stderr
internal: 0.0.0.0 port = 1080
external: tun0


# 不启用身份认证（或设置为 username，如需账号密码）
socksmethod: none

user.privileged: proxy
user.unprivileged: nobody
user.libwrap: nobody

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: connect disconnect error
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    protocol: tcp udp
    log: connect disconnect error
}